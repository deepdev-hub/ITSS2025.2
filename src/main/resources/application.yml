app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci12YmFzLWxvY2FsLWRldmVsb3BtZW50}
    expiration-hours: ${APP_JWT_EXPIRATION_HOURS:24}
  mail:
    from: ${APP_MAIL_FROM:}

resend:
  api:
    key: ${RESEND_API_KEY:}
    url: ${RESEND_API_URL:https://api.resend.com/emails}
    connect-timeout: ${RESEND_CONNECT_TIMEOUT:10s}
    read-timeout: ${RESEND_READ_TIMEOUT:15s}
